aid: openebs
name: OpenEBS
description: >-
  OpenEBS is a popular and widely deployed open source Container Native Storage
  platform for stateful persistent applications on Kubernetes. It provides
  dynamic provisioning of storage resources using containerized storage
  controllers, making it highly flexible and cloud-native.
